name: Seguridad y Tests ERP  # Nombre que verás en la pestaña 'Actions'

on: [push] # Se ejecuta cada vez que subes cambios

jobs:
  verificacion:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar mi código
        uses: actions/checkout@v4

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      # AQUÍ ES DONDE SE USAN LAS CREDENCIALES
      - name: Validar Conexión Segura
        run: php src/test_conexion.php 
        env:
          # GitHub leerá los "Secrets" que configuraste en la web 
          # y los inyectará aquí de forma invisible.
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }} 
          DB_USER: ${{ secrets.DB_USER }} 
          DB_HOST: ${{ secrets.DB_HOST }} 
          DB_NAME: ${{ secrets.DB_NAME }} 

      - name: Validar PHP
        run: php src/test_php.php

      - name: Validar SQL
        run: php src/test_sql.php 
        env:  
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }} 
          DB_USER: ${{ secrets.DB_USER }} 
          DB_HOST: ${{ secrets.DB_HOST }} 
          DB_NAME: ${{ secrets.DB_NAME }} 

      - name: Validar CSS
        run: php src/test_css.php

      - name: Validar JS    
        run: php src/test_js.php      
          
      - name: Validar HTML
        run: php src/test_html.php    

      - name: Validar PHPUnit
        run: php src/test_phpunit.php 

      - name: Validar Composer
        run: php src/test_composer.php    
            
      - name: Validar GitHub Actions
        run: php src/test_githubactions.php   
            
      - name: Validar GitHub Pages
        run: php src/test_githubpages.php
            
      - name: Validar GitHub Workflows
        run: php src/test_githubworkflows.php   
            
      - name: Validar GitHub Releases 
        run: php src/test_githubreleases.php      
            
      - name: Validar GitHub Secrets  
        run: php src/test_githubsecrets.php 
            
      - name: Validar Laragon 
        run: php src/test_laragon.php
            
      - name: Validar NPM
        run: php src/test_npm.php 
            
      - name: Validar Yarn  
        run: php src/test_yarn.php  
          
      - name: Validar Composer  
        run: php src/test_composer.php    
        
      - name: Validar NodeJS
        run: php src/test_nodejs.php  

      - name: Validar NPM
        run: php src/test_npm.php   
        