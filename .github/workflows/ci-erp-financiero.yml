name: CI ERP Financiero

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # checkout@v4 (SHA verificado)
      - name: Checkout del código
        uses: actions/checkout@v4

      # setup-php@v2 (Cambiamos a la versión tag para evitar errores de SHA)
      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, mysql, pdo_mysql

      - name: Validar Sintaxis PHP
        run: |
          find . -name "*.php" -not -path "./vendor/*" | xargs -n 1 php -l

      # setup-python@v5 (La versión más estable y reciente)
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Ejecutar Análisis de Solvencia
        run: python scripts/analisis_financiero.py